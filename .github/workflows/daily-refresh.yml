name: Update lunch menus

on:
  # No GitHub cron here on purpose: GitHub's scheduler was dead for weeks,
  # then revived 2026-07-09 firing hours late and overwriting the page in
  # the afternoon. The only trigger is cron-job.org (user's account, jobs
  # 8031253 + 8031261) calling the workflow_dispatch API at 10:45 + 11:30
  # Europe/Bratislava Mon-Fri. cron-job.org is timezone-aware, so DST is
  # handled there.
  workflow_dispatch:

permissions:
  contents: write
  models: read

concurrency:
  group: lunch-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python run.py --force --no-open
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated page
        run: |
          git config user.name "lunch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "Update menus $(date -u '+%F %H:%M')"
          git push
