name: Update lunch menus

on:
  schedule:
    # UTC crons — 10:45 and 11:30 Bratislava time in summer (CEST);
    # one hour earlier in winter, which is fine.
    # NOTE: re-pushed 2026-07-06 — GitHub never registered the schedule from
    # the initial 2026-07-05 push (zero scheduled runs); editing this file
    # forces re-registration.
    - cron: "45 8 * * 1-5"
    - cron: "30 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  models: read

concurrency:
  group: lunch-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python run.py --force --no-open
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated page
        run: |
          git config user.name "lunch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "Update menus $(date -u '+%F %H:%M')"
          git push
